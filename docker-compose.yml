services:
  egress-proxy:
    build:
      context: .
      dockerfile: trusted/proxy/Dockerfile
    environment:
      PROXY_ALLOWLIST: ${PROXY_ALLOWLIST:-httpbin.org}
      PROXY_LOG_PATH: /var/log/rsi/web_egress.jsonl
      PROXY_PROPOSAL_URL: http://bridge:8081/proposals
      PROXY_ALLOWLIST_PATH: /etc/rsi/proxy_allowlist.txt
      PROXY_CERT_EXPORT_DIR: /proxy-ca-cert
    volumes:
      - ./trusted/proxy/addon.py:/opt/proxy/addon.py:ro
      - proxy-ca:/root/.mitmproxy
      - proxy-ca-cert:/proxy-ca-cert
      - ./state/logs:/var/log/rsi
      - ./state/proxy:/etc/rsi
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import socket; s = socket.create_connection(("127.0.0.1", 8084), 2); s.close()
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - internal_net
      - external_net

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    command:
      - --config
      - /app/config.yaml
      - --port
      - "4000"
      - --host
      - 0.0.0.0
    environment:
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      DEFAULT_BATCH_SIZE: "1"
    volumes:
      - ./trusted/litellm/litellm_config.yaml:/app/config.yaml:ro
      - ./state/litellm:/app/data
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen("http://127.0.0.1:4000/health/liveliness", timeout=5).read()
      interval: 5s
      timeout: 5s
      retries: 30
    networks:
      - internal_net
      - external_net

  bridge:
    build:
      context: .
      dockerfile: trusted/bridge/Dockerfile
    environment:
      PROPOSALS_DIR: /var/lib/rsi/proposals
      RSI_BUDGET_USD: ${RSI_BUDGET_USD:-5.00}
    volumes:
      - ./state/proposals:/var/lib/rsi/proposals
      - ./state/logs:/var/log/rsi
      - ./state/proxy:/etc/rsi
      - ./state/events:/var/lib/rsi/events
      - ./state/operator_messages:/var/lib/rsi/operator_messages
      - ./state/notification_config.json:/var/lib/rsi/notification_config.json:ro
    ports:
      - "8081:8081"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen("http://127.0.0.1:8081/healthz", timeout=5).read()
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - internal_net
      - external_net

  sandbox:
    build:
      context: ./sandbox
      dockerfile: Dockerfile
    depends_on:
      egress-proxy:
        condition: service_healthy
      litellm:
        condition: service_healthy
      bridge:
        condition: service_healthy
    environment:
      HTTP_PROXY: http://egress-proxy:8084
      HTTPS_PROXY: http://egress-proxy:8084
      NO_PROXY: litellm,bridge,localhost,127.0.0.1
      LITELLM_URL: http://litellm:4000
      WALLET_URL: http://bridge:8081
      RSI_MODEL: ${RSI_MODEL:-default}
      RSI_MAX_TURNS: ${RSI_MAX_TURNS:-0}
      GIT_REMOTE_URL: ${GIT_REMOTE_URL:-}  # Set in .env to enable session persistence to GitHub
    volumes:
      - ./sandbox/seed:/workspace/agent
      - ./sandbox/supervisor.py:/opt/supervisor/supervisor.py:ro
      - ./sandbox/baseline:/opt/baseline:ro
      - ./state/backups:/var/lib/rsi/backups
      - ./state/events:/var/lib/rsi/events
      - ./state/operator_messages:/workspace/operator_messages
      - proxy-ca-cert:/usr/local/share/ca-certificates:ro
      - ./shared/chromium-seccomp.json:/opt/chromium-seccomp.json:ro
    pids_limit: 256
    security_opt:
      - seccomp=./shared/chromium-seccomp.json
    networks:
      - internal_net

networks:
  internal_net:
    internal: true
  external_net: {}

volumes:
  proxy-ca: {}
  proxy-ca-cert: {}
